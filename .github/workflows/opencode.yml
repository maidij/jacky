name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, edited]
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: "0 0 * * *" # 每天运行一次（可选）
  workflow_dispatch: # 手动触发

jobs:
  opencode:
    runs-on: ubuntu-latest

    permissions:
      contents: write # 允许创建分支和提交
      pull-requests: write # 允许创建 PR
      issues: write # 允许评论 Issue
      id-token: write # OpenCode 认证所需

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run OpenCode
        uses: sst/opencode/github@latest
        env:
          # 在这里设置你的 API 密钥（从 Secrets 中读取）
          OPENCODE_API_KEY: sk-jc50GQlqZppGQ2bgJzxwdwRL0zurM5RLkpKRksYZ2Z0ipeLS1mhoOEkNk9kcqczr # 或者其他提供商的密钥，例如：
          # HF_TOKEN: ${{ secrets.HF_TOKEN }}
          # ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          # 设置模型，格式为 provider/model
          model: "opencode/zen" # 或者你充值后可以使用的其他模型

          # 可选参数
          agent: "build" # 使用的代理
          share: true # 是否共享会话（公开仓库默认为 true）


          # 对于定时任务或手动触发，可以设置提示词
          # prompt: "检查代码中的潜在问题"
